<!doctype html>
<html>
<head>
    <title>Моя перша сторінка</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
</head>
    
<audio id="bg-music" loop>
    <source src="Yellow Magic Orchestra-Tong Poo.mp3" type="audio/mpeg">
</audio>

<button id="music-btn">🔊 Включить музыку</button>

<script>
const music = document.getElementById("bg-music");
const btn = document.getElementById("music-btn");

music.volume = 0.15;

let isPlaying = false;

btn.addEventListener("click", () => {
    if (!isPlaying) {
        music.play();
        btn.textContent = "🔇 Выключить музыку";
        isPlaying = true;
    } else {
        music.pause();
        btn.textContent = "🔊 Включить музыку";
        isPlaying = false;
    }
});
</script>
    
<body>
<div id="wrapper">

    <div id="header">
        <div class="text_header">Моя сторінка</div>
    </div>

    <div id="menu">

            <li><a href="music.html">Музика</a></li>
            <li><a href="contacts.html">Контакти</a></li>
        </ul>
    </div>

    <div id="content">
        <h1>Головна сторінка</h1>
        <p>Ласкаво просимо на мій сайт!</p>
    </div>

    <div id="footer">
        <div class="footer_text">Мій перший сайт</div>
    </div>

</div>
</body>
</html>
